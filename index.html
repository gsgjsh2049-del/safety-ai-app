<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전 AI 어시스턴트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; height: 100dvh; display: flex; flex-direction: column; }
  .header { background: #1a4a7a; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 22px; }
  .header-text h1 { font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-items: flex-end; }
  .msg.ai { align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; max-width: 85%; white-space: pre-wrap; }
  .user .bubble { background: #1a4a7a; color: white; border-bottom-right-radius: 4px; }
  .ai .bubble { background: white; color: #222; border-bottom-left-radius: 4px; border: 1px solid #e5e5e5; }
  .ai-label { font-size: 11px; color: #888; padding-left: 2px; }
  .tags { display: flex; gap: 5px; margin-top: 4px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .tag-law { background: #E6F1FB; color: #0C447C; }
  .tag-kosha { background: #EAF3DE; color: #3B6D11; }
  .quick { padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; background: white; border-top: 1px solid #eee; }
  .quick::-webkit-scrollbar { display: none; }
  .qbtn { font-size: 12px; padding: 6px 12px; border: 1px solid #ddd; border-radius: 20px; background: white; white-space: nowrap; cursor: pointer; color: #444; flex-shrink: 0; }
  .qbtn:active { background: #f0f0f0; }
  .input-area { padding: 10px 12px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; }
  .input-area textarea { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 9px 12px; font-size: 14px; font-family: inherit; resize: none; height: 42px; max-height: 100px; outline: none; line-height: 1.4; }
  .input-area textarea:focus { border-color: #1a4a7a; }
  .send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1a4a7a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:disabled { background: #ccc; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; overflow-y:auto; }
  .modal-inner { background:white; margin:20px; border-radius:16px; padding:20px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-header h2 { font-size:16px; font-weight:600; }
  .close-btn { border:none; background:none; font-size:22px; cursor:pointer; color:#666; }
  .form-group { margin-bottom:14px; }
  .form-group label { font-size:12px; color:#666; display:block; margin-bottom:5px; font-weight:500; }
  .form-group input, .form-group textarea { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; font-family:inherit; outline:none; }
  .form-group input:focus, .form-group textarea:focus { border-color:#1a4a7a; }
  .form-group textarea { height:90px; resize:none; }
  .submit-btn { width:100%; padding:13px; background:#1a4a7a; color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:6px; }
  .submit-btn:disabled { background:#ccc; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <img src="/logo.jpg" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">
  </div>
  <div class="header-text">
    <h1>제일연마공업(주) 안전 AI 어시스턴트</h1>
    <p>산업안전보건법 · KOSHA 가이드 기반</p>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg ai">
    <div class="ai-label">안전 AI</div>
    <div class="bubble">안전과 관련한 질문을 해주세요.

산업안전보건법과 KOSHA 가이드를 바탕으로 법적기준과 기술적인 내용을 알려드립니다.</div>
    <div class="tags">
      <span class="tag tag-law">산업안전보건법</span>
      <span class="tag tag-kosha">KOSHA 가이드</span>
    </div>
  </div>
</div>

<div class="quick">
  <button class="qbtn" onclick="quickAsk('고소작업 안전기준이 어떻게 되나요?')">고소작업 기준</button>
  <button class="qbtn" onclick="quickAsk('밀폐공간 작업 시 필요한 조치는?')">밀폐공간 작업</button>
  <button class="qbtn" onclick="quickAsk('지게차 안전작업 법적 기준은?')">지게차 기준</button>
  <button class="qbtn" onclick="quickAsk('화학물질 MSDS 비치 의무는?')">MSDS 의무</button>
  <button class="qbtn" onclick="quickAsk('안전모 착용 기준이 어떻게 되나요?')">안전모 기준</button>
</div>

<div style="padding: 8px 16px 10px; background: white; border-top: 1px solid #eee;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px;">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe0a5E0dSDqWy7QnB7OTo74fOJX7xNUQ8NMoDvX9wuvVkSTXA/viewform?usp=publish-editor" target="_blank" style="display:block; text-align:center; padding: 10px; background: #8e44ad; color: white; border-radius: 10px; font-size: 13px; text-decoration: none;">
      💬 안전보건 의견 청취
    </a>
    <button onclick="showRiskForm()" style="display:block; width:100%; text-align:center; padding: 10px; background: #c0392b; color: white; border-radius: 10px; font-size: 13px; border: none; cursor: pointer;">
      📋 위험성평가 진행하기
    </button>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe0a5E0dSDqWy7QnB7OTo74fOJX7xNUQ8NMoDvX9wuvVkSTXA/viewform?usp=header" target="_blank" style="display:block; text-align:center; padding: 10px; background: #27ae60; color: white; border-radius: 10px; font-size: 13px; text-decoration: none;">
      📝 TBM일지 작성하기
    </a>
    <button onclick="toggleSafetyMenu()" id="safetyMenuBtn" style="display:block; width:100%; text-align:center; padding: 10px; background: #e67e22; color: white; border-radius: 10px; font-size: 13px; border: none; cursor: pointer;">
      📁 작업별 안전조치사항 ▼
    </button>
  </div>
  <div id="safetyMenu" style="display:none; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
    <a href="/work-height.pdf" target="_blank" style="display:block; text-align:center; padding: 9px; background: #fef9f0; color: #e67e22; border-radius: 8px; font-size: 13px; text-decoration: none; border: 1px solid #f0c070;">
      🔺 고소작업
    </a>
    <a href="/forklift.pdf" target="_blank" style="display:block; text-align:center; padding: 9px; background: #fef9f0; color: #e67e22; border-radius: 8px; font-size: 13px; text-decoration: none; border: 1px solid #f0c070;">
      🚜 지게차 작업
    </a>
    <a href="/fire-work.pdf" target="_blank" style="display:block; text-align:center; padding: 9px; background: #fef9f0; color: #e67e22; border-radius: 8px; font-size: 13px; text-decoration: none; border: 1px solid #f0c070;">
      🔥 화기작업
    </a>
    <a href="/equipment-check.pdf" target="_blank" style="display:block; text-align:center; padding: 9px; background: #fef9f0; color: #e67e22; border-radius: 8px; font-size: 13px; text-decoration: none; border: 1px solid #f0c070;">
      🔧 설비점검
    </a>
  </div>
  <a href="/safety-manual.pdf" target="_blank" style="display:block; text-align:center; padding: 10px; background: #1a4a7a; color: white; border-radius: 10px; font-size: 13px; text-decoration: none;">
    📄 안전보건매뉴얼 보기
  </a>
</div>
<div class="input-area">
  <textarea id="userInput" placeholder="안전 관련 질문을 입력하세요..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
    oninput="this.style.height='42px';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<!-- 위험성 평가서 모달 -->
<div class="modal" id="riskModal">
  <div class="modal-inner">
    <div class="modal-header">
      <h2>📋 위험성 평가서</h2>
      <button class="close-btn" onclick="closeRiskForm()">✕</button>
    </div>

    <div class="form-group">
      <label>업체명 *</label>
      <input id="r_업체명" type="text" placeholder="업체명 입력">
    </div>
    <div class="form-group">
      <label>작업일자 *</label>
      <input id="r_작업일자" type="date">
    </div>
    <div class="form-group">
      <label>작업장소 및 설비명 *</label>
      <input id="r_작업장소" type="text" placeholder="작업장소 및 설비명 입력">
    </div>
    <div class="form-group">
      <label>위험요인 *</label>
      <textarea id="r_위험요인" placeholder="위험요인 입력"></textarea>
    </div>
    <div class="form-group">
      <label>안전대책 *</label>
      <textarea id="r_안전대책" placeholder="안전대책 입력"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitRiskForm()">제출하기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
let history = [];
let emailjsReady = false;

async function initEmailJS() {
  try {
    const res = await fetch('/api/emailjs-key');
    const data = await res.json();
    emailjs.init(data.publicKey);
    emailjsReady = true;
  } catch(e) {}
}
initEmailJS();

async function sendMsg() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '42px';
  btn.disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.reply || '오류가 발생했습니다. 다시 시도해주세요.';
    removeTyping();
    addMsg('ai', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping();
    addMsg('ai', '네트워크 오류가 발생했습니다. 다시 시도해주세요.');
  }
  btn.disabled = false;
}

function quickAsk(q) {
  document.getElementById('userInput').value = q;
  sendMsg();
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  if (role === 'ai') {
    const label = document.createElement('div');
    label.className = 'ai-label';
    label.textContent = '안전 AI';
    div.appendChild(label);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  if (role === 'ai') {
    const tags = document.createElement('div');
    tags.className = 'tags';
    tags.innerHTML = '<span class="tag tag-law">산업안전보건법</span><span class="tag tag-kosha">KOSHA 가이드</span>';
    div.appendChild(tags);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  const label = document.createElement('div');
  label.className = 'ai-label';
  label.textContent = '안전 AI';
  div.appendChild(label);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showRiskForm() {
  document.getElementById('riskModal').style.display = 'block';
}

function closeRiskForm() {
  document.getElementById('riskModal').style.display = 'none';
}

async function submitRiskForm() {
  const fields = {
    '업체명': 'r_업체명',
    '작업일자': 'r_작업일자',
    '작업장소 및 설비명': 'r_작업장소',
    '위험요인': 'r_위험요인',
    '안전대책': 'r_안전대책'
  };

  const params = {};
  for (const [label, id] of Object.entries(fields)) {
    const val = document.getElementById(id).value.trim();
    if (!val) { alert(label + '을(를) 입력해주세요.'); return; }
    params[label] = val;
  }
  params['제출시간'] = new Date().toLocaleString('ko-KR');

  const btn = document.getElementById('submitBtn');
  btn.textContent = '제출 중...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    });
    const data = await res.json();
    if (data.success) {
      alert('위험성 평가서가 제출되었습니다!');
      closeRiskForm();
      document.querySelectorAll('#riskModal input, #riskModal textarea').forEach(el => el.value = '');
    } else {
      alert('제출 실패. 다시 시도해주세요.');
    }
  } catch(e) {
    alert('오류가 발생했습니다. 다시 시도해주세요.');
  }
  btn.textContent = '제출하기';
  btn.disabled = false;
}
 function toggleSafetyMenu() {
  const menu = document.getElementById('safetyMenu');
  const btn = document.getElementById('safetyMenuBtn');
  if (menu.style.display === 'none' || menu.style.display === '') {
    menu.style.display = 'flex';
    btn.textContent = '📁 작업별 안전조치사항 ▲';
  } else {
    menu.style.display = 'none';
    btn.textContent = '📁 작업별 안전조치사항 ▼';
  }
}
</script>
</body>
</html>
